<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>リモートシフト自動生成</title>
<style>
  :root{
    --text:#1f2329; --sub:#646a73; --line:#dee0e3; --bg:#ffffff; --panel:#f5f6f7;
    --accent:#3370ff; --accent-dark:#245bdb;
    --ok:#2ea121; --warn:#de7802; --err:#d83931;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0; padding:16px; background:var(--bg); color:var(--text);
    font-family:"Hiragino Sans","Noto Sans JP","Yu Gothic UI",Meiryo,sans-serif;
    font-size:13px; line-height:1.6;
  }
  h1{ font-size:15px; font-weight:700; margin:0 0 2px; }
  h1 .ver{ font-size:11px; font-weight:400; color:var(--sub); margin-left:6px; }
  .sub{ color:var(--sub); font-size:12px; margin-bottom:14px; }
  .sub b{ color:var(--text); font-weight:600; }
  .buttons{ display:flex; flex-direction:column; gap:8px; margin-bottom:14px; }
  button{
    width:100%; padding:9px 12px; border-radius:6px; font-size:13px; font-weight:600;
    border:1px solid var(--line); background:#fff; color:var(--text); cursor:pointer;
  }
  button.primary{ background:var(--accent); border-color:var(--accent); color:#fff; }
  button.primary:hover:not(:disabled){ background:var(--accent-dark); }
  button:hover:not(:disabled){ border-color:var(--accent); }
  button:disabled{ opacity:.5; cursor:not-allowed; }
  button:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }
  #log{ border-top:1px solid var(--line); padding-top:10px; }
  .line{ display:flex; gap:8px; margin:3px 0; }
  .dot{ flex:none; width:8px; height:8px; border-radius:50%; margin-top:6px; background:var(--sub); }
  .line.ok .dot{ background:var(--ok); } .line.warn .dot{ background:var(--warn); }
  .line.err .dot{ background:var(--err); } .line.run .dot{ background:var(--accent); }
  .line.warn{ color:var(--warn); } .line.err{ color:var(--err); }
  .report{
    background:var(--panel); border:1px solid var(--line); border-radius:6px;
    padding:10px 12px; margin:8px 0; white-space:pre-wrap; font-size:12px;
  }
</style>
</head>
<body>
  <h1>リモートシフト自動生成<span class="ver">v2.5</span></h1>
  <div class="sub">対象週: <b id="targetWeek">計算中…</b>（実行日の翌週・月曜はじまり）</div>
  <div class="buttons">
    <button id="btnGen" class="primary">シフトを生成（下書き）</button>
    <button id="btnSelfTest">仕様テストを実行（デグレ確認）</button>
  </div>
  <div id="log"></div>

<script type="module">
/* ====================================================================
 * リモートシフト自動生成プラグイン v2.5（Lark Base用・単一ファイル）
 * 2026-06-12 改修: 実際のBase構造に合わせた対応版
 *   1) テーブル名: 役職マスタ ／ Division座席数マスタ ／ 週管理マスタ
 *   2) 担当関係: チーフ／アシスタントの行に「担当メンバー」（関連・複数）を持つ方式
 *      ※在籍中のメンバーだけを判定対象にします
 *   3) リモート可否: ON／OFF の単一選択（チェックボックスでも動作）
 *   4) 役職の兼務: 複数役職のうち1つでもOFFがあれば常駐扱い（安全側）
 *   5) 例外フラグ: 列が無ければ全員「なし」として扱う（任意）
 *   6) 表記: 出社→「本社」、休→「休み」に変更（冒頭のVALで調整可能）＋選択肢の自動検証を追加
 *   7) 書き込み形式を6通りに拡張（選択肢ID解決を含む）＋失敗理由の詳細表示
 *   8) v2.5: 「設定チェック」ボタンを廃止し検証を生成ボタンに統合／エラーは原因特定できる粒度で表示
 *           ／生成結果を全仕様で自己検証(verifyPlan)してから書き込み
 *           ／デグレ防止の内蔵セルフテスト(runSelfTest)＝「仕様テストを実行」ボタンを追加
 * --------------------------------------------------------------------
 * 認証情報・APIキーは一切含みません（開いている人の権限で動作します）。
 * 使い方: ①このファイルをHTTPSのURLに設置 → ②Baseの拡張機能から
 *         カスタムプラグイン（スクリプト）としてURLを登録 →
 *         ③「シフトを生成（下書き）」を実行（検証は自動で先に走ります）
 *         ※改修したら「仕様テストを実行」で全仕様の維持を自己診断できます
 * ==================================================================== */

/* ---- 設定（Base側のテーブル名・フィールド名・選択肢と完全一致させる）---- */
const CONFIG = {
  TABLES: {
    ROLE: '役職マスタ', DIV: 'Division座席数マスタ', EMP: '社員マスタ',
    SHIFT: 'シフト表', WLOG: '週管理マスタ', HOLIDAY: '祝日マスタ'
  },
  FIELD: {
    ROLE:    { NAME: '役職名', REMOTE_OK: 'リモート可否' },
    DIV:     { NAME: 'Division名', SEATS: '席数' },
    EMP:     { NAME: '氏名', ROLE: '役職', DIV: '所属Division', MEMBERS: '担当メンバー',
               EXCEPTION: '例外フラグ', STATUS: '在籍状況' },   // 例外フラグは任意（無くても可）
    SHIFT:   { WEEK: '週', EMP: '社員', DAYS: ['月','火','水','木','金'], STATUS: 'ステータス' },
    WLOG:    { WEEK: '週', RESULT: '生成結果', LOG: 'ログ', STATUS: 'ステータス' },
    HOLIDAY: { DATE: '日付', NAME: '名称' }
  },
  VAL: {
    OFFICE: '本社', REMOTE: 'リモート', OFF: '休み', DRAFT: '下書き', FINAL: '確定',
    ACTIVE: '在籍', MUST_ONSITE: '常駐必須', OK: '成功', WARN: '警告あり', ERR: 'エラー'
  },
  RULES: { MAX_REMOTE_PER_WEEK: 2, FAIRNESS_LOOKBACK_WEEKS: 4, MAX_RETRY: 200 }
};
const F = CONFIG.FIELD, V = CONFIG.VAL, R = CONFIG.RULES;

/* ---- 画面まわり ---- */
const logEl = document.getElementById('log');
const btnGen = document.getElementById('btnGen');
const btnSelfTest = document.getElementById('btnSelfTest');
function log(msg, type){ const d=document.createElement('div'); d.className='line '+(type||'');
  d.innerHTML='<span class="dot"></span><span></span>'; d.lastChild.textContent=msg; logEl.appendChild(d); }
function report(text){ const d=document.createElement('div'); d.className='report'; d.textContent=text; logEl.appendChild(d); }
function clearLog(){ logEl.innerHTML=''; }
function setBusy(b){ btnGen.disabled=b; btnSelfTest.disabled=b; }

/* ---- 日付ヘルパー ---- */
const DAY = 86400000;
function nextMonday(){ const d=new Date(); d.setHours(0,0,0,0); do{ d.setDate(d.getDate()+1); }while(d.getDay()!==1); return d; }
function addDays(d,n){ const x=new Date(d.getTime()); x.setDate(x.getDate()+n); return x; }
function dayDiff(a,b){ return Math.round((a.getTime()-b.getTime())/DAY); }
function weeksAgo(ts, mondayMs){ return Math.round((mondayMs-ts)/(7*DAY)); }
function fmt(d){ return d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0'); }
function dateKey(ts){ const d=new Date(ts); return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate(); }

/* ---- セル値の解釈（Baseの返却形式の揺れを吸収）---- */
function cellText(v){
  if (v==null) return '';
  if (typeof v==='string') return v;
  if (typeof v==='number'||typeof v==='boolean') return String(v);
  if (Array.isArray(v)) return v.map(cellText).join('');
  if (typeof v==='object'){ if (typeof v.text==='string') return v.text; if (typeof v.name==='string') return v.name; }
  return String(v);
}
function cellNum(v){ if (v==null) return 0; if (typeof v==='number') return v; const n=Number(cellText(v)); return isNaN(n)?0:n; }
function cellLinkIds(v){
  if (!v) return [];
  if (Array.isArray(v)){ const out=[]; for(const x of v){
    if (typeof x==='string') out.push(x);
    else if (x&&Array.isArray(x.recordIds)) out.push(...x.recordIds);
    else if (x&&Array.isArray(x.record_ids)) out.push(...x.record_ids);
    else if (x&&x.recordId) out.push(x.recordId); } return out; }
  if (Array.isArray(v.recordIds)) return v.recordIds;
  if (Array.isArray(v.record_ids)) return v.record_ids;
  return [];
}
const firstLink = v => cellLinkIds(v)[0] || null;
/* リモート可否: チェックボックスtrue または 単一選択「ON」をリモート可と解釈 */
function isRemoteOK(v){
  if (v===true) return true;
  const t=cellText(v).trim().toUpperCase();
  return t==='ON'||t==='TRUE'||t==='はい';
}

/* ---- SDK 読み込み ---- */
let bitable=null;
async function loadSDK(){
  if (bitable) return;
  const urls=['https://cdn.jsdelivr.net/npm/@lark-base-open/js-sdk/+esm',
              'https://esm.sh/@lark-base-open/js-sdk'];
  let lastErr=null;
  for (const u of urls){ try{ const m=await import(u); bitable=m.bitable; if(bitable) return; }catch(e){ lastErr=e; } }
  throw new Error('Base SDKを読み込めませんでした。ネットワーク（CDNへの到達性）を確認してください。'+(lastErr?(' 詳細: '+lastErr.message):''));
}

/* ---- テーブル・フィールド ---- */
async function getTables(){
  await loadSDK();
  const tables={}, missing=[];
  for (const key of Object.keys(CONFIG.TABLES)){
    const name=CONFIG.TABLES[key];
    try{ tables[key]=await withTimeout(bitable.base.getTableByName(name), 8000,
      'Baseに接続できません。このページはLark Baseのプラグインとして開いてください。'); }
    catch(e){ if(String(e.message||e).includes('接続できません')) throw e; missing.push(name); }
  }
  return { tables, missing };
}
function withTimeout(promise, ms, msg){
  return Promise.race([promise, new Promise((_,rej)=>setTimeout(()=>rej(new Error(msg)), ms))]);
}
async function getMap(table){
  const metas=await table.getFieldMetaList();
  const byName={}; metas.forEach(m=>{ byName[m.name]=m.id; });
  return byName;
}
function checkFields(map, names, tableName, problems){
  names.forEach(n=>{ if(!map[n]) problems.push('テーブル「'+tableName+'」にフィールド「'+n+'」がありません'); });
}
/* 単一選択フィールドに必要な選択肢が揃っているか検証する */
/* 単一選択フィールドの「選択肢名→ID」マップを作る（ID形式での書き込み用） */
async function getOptionMap(table){
  const out = {};
  const metas = await table.getFieldMetaList();
  metas.forEach(function(meta){
    const raw = meta.property && meta.property.options;
    if (!Array.isArray(raw)) return;
    const map = {};
    raw.forEach(function(o){ const nm = o && (o.name || o.text); if (nm && o.id) map[nm] = o.id; });
    out[meta.id] = map;
  });
  return out;
}
async function checkSelectOptions(tables, problems){
  const plan = {
    SHIFT: [ [F.SHIFT.DAYS, [V.OFFICE, V.REMOTE, V.OFF]], [[F.SHIFT.STATUS], [V.DRAFT, V.FINAL]] ],
    WLOG:  [ [[F.WLOG.RESULT], [V.OK, V.WARN, V.ERR]], [[F.WLOG.STATUS], [V.DRAFT, V.FINAL]] ]
  };
  for (const key of Object.keys(plan)){
    if (!tables[key]) continue;
    let metas;
    try{ metas = await tables[key].getFieldMetaList(); }catch(e){ continue; }
    for (const pair of plan[key]){
      const fields = pair[0], reqs = pair[1];
      for (const fname of fields){
        const meta = metas.find(m=>m.name===fname);
        if (!meta || !meta.property || !Array.isArray(meta.property.options)) continue;
        const opts = meta.property.options.map(o=>(o && (o.name || o.text)) || '').filter(Boolean);
        for (const req of reqs){
          if (opts.indexOf(req) === -1){
            problems.push('テーブル「'+CONFIG.TABLES[key]+'」の「'+fname+'」に選択肢「'+req+'」がありません（現在: '+(opts.join('・')||'未設定')+'）');
          }
        }
      }
    }
  }
}
async function readAll(table){
  const out=[]; let pageToken=undefined; let size=5000;
  while(true){
    let res;
    try{ res=await table.getRecords({ pageSize:size, pageToken }); }
    catch(e){ if(size>500){ size=500; continue; } throw e; }
    const recs=res.records||res.items||[];
    out.push(...recs);
    const more=res.hasMore===true; pageToken=res.pageToken||res.page_token;
    if(!more||!pageToken) break;
  }
  return out;
}

/* ---- 書き込み形式の自動判定（環境差を吸収）----
 * リンク／単一選択の書き込み形式は環境により受理形が異なるため、
 * 6通りの形式でテスト行を書き込み→読み戻し検証→削除し、通った形式を採用します。 */
const LINK_STYLES = {
  obj: { label: 'リンク=recordIds形式', fn: function(id){ return { recordIds: [id] }; } },
  arr: { label: 'リンク=ID配列形式',    fn: function(id){ return [id]; } }
};
const SEL_STYLES = { str: '選択=文字列', idText: '選択=ID+テキスト', text: '選択=テキストのみ' };
let WRITE = { link: 'obj', sel: 'str' };

function linkVal(id){ return LINK_STYLES[WRITE.link].fn(id); }
function selVal(ctx, fieldId, label){
  if (WRITE.sel === 'str') return label;
  if (WRITE.sel === 'idText'){
    const oid = ctx.opts && ctx.opts[fieldId] && ctx.opts[fieldId][label];
    return oid ? { id: oid, text: label } : { text: label };
  }
  return { text: label };
}
function normRecordId(rid){
  if (rid && typeof rid === 'object') return rid.recordId || rid.record_id || rid.id || null;
  return rid || null;
}
function recordFields(rec){
  if (!rec) return {};
  if (rec.fields) return rec.fields;
  if (rec.record && rec.record.fields) return rec.record.fields;
  return rec;
}
async function probeWriteFormat(ctx, sampleEmpId){
  const tShift = ctx.tables.SHIFT, m = ctx.maps.SHIFT;
  const fails = [];
  for (const lk of Object.keys(LINK_STYLES)){
    for (const sl of Object.keys(SEL_STYLES)){
      WRITE = { link: lk, sel: sl };
      const tag = LINK_STYLES[lk].label + '・' + SEL_STYLES[sl];
      let rid = null;
      try{
        const fields = {};
        fields[m[F.SHIFT.WEEK]] = Date.now();
        fields[m[F.SHIFT.EMP]] = linkVal(sampleEmpId);
        fields[m[F.SHIFT.DAYS[0]]] = selVal(ctx, m[F.SHIFT.DAYS[0]], V.OFFICE);
        fields[m[F.SHIFT.STATUS]] = selVal(ctx, m[F.SHIFT.STATUS], V.DRAFT);
        rid = normRecordId(await tShift.addRecord({ fields: fields }));
        if (!rid) throw new Error('recordIdが取得できませんでした');
        const fl = recordFields(await tShift.getRecordById(rid));
        const gotLink = cellLinkIds(fl[m[F.SHIFT.EMP]]);
        const gotSel = cellText(fl[m[F.SHIFT.DAYS[0]]]);
        await tShift.deleteRecord(rid); rid = null;
        if (gotLink.indexOf(sampleEmpId) !== -1 && gotSel === V.OFFICE) return tag;
        fails.push('[' + tag + '] 検証NG: 社員=' + JSON.stringify(fl[m[F.SHIFT.EMP]]).slice(0, 60) +
          ' / 月=' + JSON.stringify(fl[m[F.SHIFT.DAYS[0]]]).slice(0, 40));
      }catch(e){
        if (rid){ try{ await tShift.deleteRecord(rid); }catch(ignore){} }
        fails.push('[' + tag + '] 例外: ' + String((e && e.message) || e).slice(0, 90));
      }
    }
  }
  throw new Error('シフト表へのテスト書き込みが全形式で失敗しました。以下の詳細をそのまま共有してください。\n' + fails.join('\n'));
}

/* ---- マスタ読み込み ---- */
async function loadMasters(ctx){
  const roles={};
  (await readAll(ctx.tables.ROLE)).forEach(r=>{
    roles[r.recordId]={ name:cellText(r.fields[ctx.maps.ROLE[F.ROLE.NAME]]),
                        remoteOK:isRemoteOK(r.fields[ctx.maps.ROLE[F.ROLE.REMOTE_OK]]) };
  });
  const divisions={};
  (await readAll(ctx.tables.DIV)).forEach(r=>{
    divisions[r.recordId]={ id:r.recordId, name:cellText(r.fields[ctx.maps.DIV[F.DIV.NAME]]),
                            seats:cellNum(r.fields[ctx.maps.DIV[F.DIV.SEATS]]) };
  });
  const m=ctx.maps.EMP; const employees=[];
  (await readAll(ctx.tables.EMP)).forEach(r=>{
    const f=r.fields;
    if (cellText(f[m[F.EMP.STATUS]])!==V.ACTIVE) return;   // 在籍のみ（入社予定・休職・退職は対象外）
    const linkedRoles=cellLinkIds(f[m[F.EMP.ROLE]]).map(id=>roles[id]).filter(Boolean);
    employees.push(buildEmployee({
      id:r.recordId,
      name:cellText(f[m[F.EMP.NAME]]),
      linkedRoles:linkedRoles,
      exception:cellText(f[m[F.EMP.EXCEPTION]]),           // 列が無ければ常に空（=例外なし）
      divisionId:firstLink(f[m[F.EMP.DIV]]),
      memberIds:cellLinkIds(f[m[F.EMP.MEMBERS]])           // 担当メンバー（チーフ／アシ行に入る）
    }));
  });
  resolveDependents(employees);                            // 担当メンバーのうち在籍者だけを判定対象に
  return { employees, divisions };
}

/* ---- 社員レコードの解釈（純粋関数・セルフテストと共用）----
 * 入力: { id, name, linkedRoles:[{name,remoteOK}], exception, divisionId, memberIds }
 * リモート可の判定: 役職が1つ以上あり、その全役職がリモート可で、例外フラグが常駐必須でないこと（兼務は安全側）。*/
function buildEmployee(src){
  const linked=src.linkedRoles||[];
  return {
    id:src.id,
    name:src.name||'(氏名未設定)',
    roleName:linked.length?linked.map(x=>x.name).join('・'):'(役職未設定)',
    hasRole:linked.length>0,
    remoteOK:linked.length>0 && linked.every(x=>x.remoteOK) && src.exception!==V.MUST_ONSITE,
    divisionId:src.divisionId||null,
    memberIds:src.memberIds||[],
    dependents:[]
  };
}
/* 担当メンバー（memberIds）のうち、在籍中の社員だけを dependents に解決する */
function resolveDependents(employees){
  const activeIds=new Set(employees.map(e=>e.id));
  employees.forEach(e=>{ e.dependents=(e.memberIds||[]).filter(id=>activeIds.has(id)); });
  return employees;
}
function groupByDiv(employees){
  const m={}; employees.forEach(e=>{ if(e.divisionId){ (m[e.divisionId]=m[e.divisionId]||[]).push(e); } }); return m;
}

/* ---- 営業日（祝日マスタを参照）---- */
async function businessDays(ctx, monday, notes){
  const holi={};
  (await readAll(ctx.tables.HOLIDAY)).forEach(r=>{
    const ts=Number(r.fields[ctx.maps.HOLIDAY[F.HOLIDAY.DATE]]);
    if(ts) holi[dateKey(ts)]=cellText(r.fields[ctx.maps.HOLIDAY[F.HOLIDAY.NAME]])||'祝日';
  });
  const days=[];
  for(let i=0;i<5;i++){
    const date=addDays(monday,i); const h=holi[dateKey(date.getTime())];
    if(h) notes.push(fmt(date)+'（'+F.SHIFT.DAYS[i]+'）は'+h+'のため全員「休」にします。');
    else days.push({ idx:i, label:F.SHIFT.DAYS[i], date });
  }
  return days;
}

/* ---- 事前チェック（実行可能性）---- */
function preCheck(employees, divisions, days){
  const errors=[], warnings=[];
  const noRole=employees.filter(e=>!e.hasRole);
  if(noRole.length) warnings.push('役職未設定のため常駐扱い: '+noRole.map(e=>e.name).join('、'));
  const noDiv=employees.filter(e=>!e.divisionId);
  if(noDiv.length) warnings.push('所属Division未設定のため終日出社扱い: '+noDiv.map(e=>e.name).join('、'));
  const byDiv=groupByDiv(employees);
  for(const divId of Object.keys(byDiv)){
    const div=divisions[divId], list=byDiv[divId];
    if(!div){ warnings.push('Division座席数マスタに無い所属が設定されています（該当者は出社扱い）'); continue; }
    const quota=Math.max(0, list.length-div.seats);
    if(quota===0) continue;
    const mustOnsite=list.filter(e=>!e.remoteOK).length;
    if(mustOnsite>div.seats){ errors.push('【'+div.name+'】常駐必須'+mustOnsite+'名が席数'+div.seats+'席を超えています。物理的に成立しません。'); continue; }
    const freeEligible=list.filter(e=>e.remoteOK&&e.dependents.length===0).length;
    const demand=quota*days.length, supply=freeEligible*R.MAX_REMOTE_PER_WEEK;
    if(demand>supply){ errors.push('【'+div.name+'】必要リモート延べ'+demand+'枠（毎日'+quota+'名×'+days.length+'日）に対し供給は延べ'+supply+'枠（リモート可'+freeEligible+'名×週'+R.MAX_REMOTE_PER_WEEK+'回）。席数の増加かルール緩和が必要です。'); continue; }
    let adj=false; for(let i=1;i<days.length;i++){ if(dayDiff(days[i].date,days[i-1].date)===1) adj=true; }
    if(adj&&quota*2>freeEligible){ errors.push('【'+div.name+'】連続リモート不可のため隣接2日で別々の'+(quota*2)+'名が必要ですが、リモート可は'+freeEligible+'名です。'); continue; }
    if(quota>Math.floor(freeEligible/3)) warnings.push('【'+div.name+'】毎日'+quota+'名のリモートが必要（リモート可'+freeEligible+'名）でやや余裕が少なめです。');
  }
  return { errors, warnings };
}

/* ---- 生成（制約付き・重み付きランダム抽選＋再試行）---- */
function canPick(e, day, days, remote){
  if(!e.remoteOK) return false;
  const mine=remote[e.id];
  if(mine[day.idx]) return false;
  if(Object.keys(mine).length>=R.MAX_REMOTE_PER_WEEK) return false;
  for(const other of days){ if(mine[other.idx]&&Math.abs(dayDiff(other.date,day.date))===1) return false; }
  return true;
}
function weightedPick(pool, recent, remote){
  const w=pool.map(e=>1/(1+(recent[e.id]||0)+Object.keys(remote[e.id]).length*2));
  let total=0; w.forEach(x=>total+=x);
  let r=Math.random()*total;
  for(let i=0;i<pool.length;i++){ r-=w[i]; if(r<=0) return pool[i]; }
  return pool[pool.length-1];
}
function generate(employees, divisions, days, recent){
  const byDiv=groupByDiv(employees); let lastFail='';
  for(let attempt=1; attempt<=R.MAX_RETRY; attempt++){
    const remote={}; employees.forEach(e=>{ remote[e.id]={}; });
    let failed='';
    outer:
    for(const day of days){
      for(const divId of Object.keys(byDiv)){
        const div=divisions[divId]; if(!div) continue;
        const list=byDiv[divId];
        const quota=Math.max(0, list.length-div.seats);
        if(quota<=0) continue;
        let picked=0;
        // フェーズ1: 担当メンバーを持たない人から抽選
        let pool=list.filter(e=>e.dependents.length===0&&canPick(e,day,days,remote));
        while(picked<quota&&pool.length){ const s=weightedPick(pool,recent,remote);
          remote[s.id][day.idx]=true; picked++; pool=pool.filter(e=>e.id!==s.id); }
        // フェーズ2: チーフ／アシスタント（担当メンバー全員がこの日リモートの場合のみ）
        if(picked<quota){
          let pool2=list.filter(e=>e.dependents.length>0&&canPick(e,day,days,remote)
            &&e.dependents.every(mid=>remote[mid]&&remote[mid][day.idx]));
          while(picked<quota&&pool2.length){ const s=weightedPick(pool2,recent,remote);
            remote[s.id][day.idx]=true; picked++; pool2=pool2.filter(e=>e.id!==s.id); }
        }
        if(picked<quota){ failed=day.label+'曜の【'+div.name+'】で必要'+quota+'名に対し'+picked+'名のみ'; break outer; }
      }
    }
    if(!failed) return { remote, attempts:attempt };
    lastFail=failed;
  }
  throw new Error('制約を満たすシフトを'+R.MAX_RETRY+'回試行しても生成できませんでした。直近の失敗: '+lastFail+'。席数またはルールの見直しが必要です。');
}

/* ---- 生成結果の検証（純粋関数・セルフテストと共用）----
 * remote[empId] = { 曜日idx: true } を、全仕様に照らして検証し、違反の配列を返す（空なら合格）。*/
function verifyPlan(employees, divisions, days, remote){
  const v=[];
  const byId={}; employees.forEach(e=>{ byId[e.id]=e; });
  const present={}; days.forEach(d=>{ present[d.idx]=true; });
  const r=id=>remote[id]||{};
  // 仕様1: 常駐必須（remoteOK=false）はリモートに割り当てない
  employees.forEach(e=>{
    if(e.remoteOK) return;
    days.forEach(d=>{ if(r(e.id)[d.idx]) v.push('常駐必須の'+e.name+'が'+d.label+'にリモート'); });
  });
  // 仕様2: 週のリモート回数は上限以内
  employees.forEach(e=>{
    const c=days.filter(d=>r(e.id)[d.idx]).length;
    if(c>R.MAX_REMOTE_PER_WEEK) v.push(e.name+'のリモートが週'+c+'回（上限'+R.MAX_REMOTE_PER_WEEK+'）');
  });
  // 仕様3: 連続2営業日のリモート禁止
  employees.forEach(e=>{
    for(let i=1;i<days.length;i++){
      if(dayDiff(days[i].date,days[i-1].date)===1 && r(e.id)[days[i].idx] && r(e.id)[days[i-1].idx])
        v.push(e.name+'が'+days[i-1].label+'→'+days[i].label+'で連続リモート');
    }
  });
  // 仕様4: 各Divisionの各営業日で、出社人数が席数以内（＝リモート人数が超過数以上）
  const byDiv=groupByDiv(employees);
  for(const divId of Object.keys(byDiv)){
    const div=divisions[divId]; if(!div) continue;
    const list=byDiv[divId];
    const quota=Math.max(0, list.length-div.seats);
    days.forEach(d=>{
      const remoteCnt=list.filter(e=>r(e.id)[d.idx]).length;
      const officeCnt=list.length-remoteCnt;
      if(officeCnt>div.seats) v.push('【'+div.name+'】'+d.label+'の出社'+officeCnt+'名が席数'+div.seats+'超過');
      if(quota>0 && remoteCnt<quota) v.push('【'+div.name+'】'+d.label+'のリモート'+remoteCnt+'名が必要数'+quota+'未満');
    });
  }
  // 仕様5: チーフ／アシスタントは、担当メンバーが1人でも出社の日はリモート不可
  employees.forEach(e=>{
    if(!e.dependents||e.dependents.length===0) return;
    days.forEach(d=>{
      if(!r(e.id)[d.idx]) return;
      const anyDepOffice=e.dependents.some(mid=>byId[mid] && !r(mid)[d.idx]);
      if(anyDepOffice) v.push(e.name+'（担当持ち）が'+d.label+'にリモートだが担当メンバーに出社者あり');
    });
  });
  return v;
}

/* ====================================================================
 * 内蔵セルフテスト（デグレ防止）
 * 実際のBaseに接続せず、合成データで全仕様を検証する。改修のたびに実行する。
 * ==================================================================== */
function runSelfTest(){
  const results=[];
  const ok=(name)=>results.push({name,pass:true});
  const ng=(name,detail)=>results.push({name,pass:false,detail});
  const ROLE_REMOTE={name:'メンバー',remoteOK:true};
  const ROLE_ONSITE={name:'マネージャー',remoteOK:false};
  const ROLE_CHIEF={name:'チーフ',remoteOK:true};
  // 5営業日（連続）を用意
  const base=new Date(2026,0,5); // 月曜
  const days5=[0,1,2,3,4].map(i=>({idx:i,label:['月','火','水','木','金'][i],date:addDays(base,i)}));

  // --- 単体テスト群: buildEmployee の解釈ルール ---
  try{
    const e=buildEmployee({id:'a',name:'A',linkedRoles:[ROLE_REMOTE],exception:'',divisionId:'d',memberIds:[]});
    e.remoteOK ? ok('buildEmployee: 単一リモート可役職→可') : ng('buildEmployee: 単一リモート可役職→可','remoteOKがfalse');
  }catch(err){ ng('buildEmployee: 単一リモート可役職→可','例外'+err.message); }
  try{
    const e=buildEmployee({id:'a',name:'A',linkedRoles:[ROLE_REMOTE,ROLE_ONSITE],exception:'',divisionId:'d',memberIds:[]});
    !e.remoteOK ? ok('buildEmployee: 兼務で1つでも常駐→常駐') : ng('buildEmployee: 兼務で1つでも常駐→常駐','remoteOKがtrueになっている');
  }catch(err){ ng('buildEmployee: 兼務で1つでも常駐→常駐','例外'+err.message); }
  try{
    const e=buildEmployee({id:'a',name:'A',linkedRoles:[ROLE_REMOTE],exception:V.MUST_ONSITE,divisionId:'d',memberIds:[]});
    !e.remoteOK ? ok('buildEmployee: 例外フラグ常駐必須→常駐') : ng('buildEmployee: 例外フラグ常駐必須→常駐','例外フラグが無視されている');
  }catch(err){ ng('buildEmployee: 例外フラグ常駐必須→常駐','例外'+err.message); }
  try{
    const e=buildEmployee({id:'a',name:'A',linkedRoles:[],exception:'',divisionId:'d',memberIds:[]});
    (!e.remoteOK && !e.hasRole) ? ok('buildEmployee: 役職未設定→常駐扱い') : ng('buildEmployee: 役職未設定→常駐扱い','hasRole/remoteOKが不正');
  }catch(err){ ng('buildEmployee: 役職未設定→常駐扱い','例外'+err.message); }
  try{
    const list=[
      buildEmployee({id:'chief',name:'C',linkedRoles:[ROLE_CHIEF],exception:'',divisionId:'d',memberIds:['m1','retired']}),
      buildEmployee({id:'m1',name:'M1',linkedRoles:[ROLE_REMOTE],exception:'',divisionId:'d',memberIds:[]})
    ];
    resolveDependents(list);
    (list[0].dependents.length===1 && list[0].dependents[0]==='m1')
      ? ok('resolveDependents: 退職者は担当から除外') : ng('resolveDependents: 退職者は担当から除外','dependents='+JSON.stringify(list[0].dependents));
  }catch(err){ ng('resolveDependents: 退職者は担当から除外','例外'+err.message); }

  // --- 結合テスト群: generate→verifyPlan が全仕様を満たすか（複数シナリオ）---
  function scenario(name, employees, divisions, days){
    try{
      resolveDependents(employees);
      const plan=generate(employees, divisions, days, {});
      const viol=verifyPlan(employees, divisions, days, plan.remote);
      viol.length===0 ? ok('生成: '+name) : ng('生成: '+name, viol.slice(0,3).join(' / '));
    }catch(err){ ng('生成: '+name, '例外: '+err.message); }
  }
  // S1: 6名/席4 → 毎日2名リモート、メンバーのみ
  (function(){
    const emps=[]; for(let i=0;i<6;i++) emps.push(buildEmployee({id:'e'+i,name:'E'+i,linkedRoles:[ROLE_REMOTE],exception:'',divisionId:'d1',memberIds:[]}));
    scenario('6名/席4/全員メンバー', emps, {d1:{id:'d1',name:'D1',seats:4}}, days5);
  })();
  // S2: 常駐必須を含む 8名/席6（毎日2名リモート）、2名が常駐必須＋リモート可6名 → 供給延べ12枠で充足
  (function(){
    const emps=[];
    for(let i=0;i<6;i++) emps.push(buildEmployee({id:'r'+i,name:'R'+i,linkedRoles:[ROLE_REMOTE],exception:'',divisionId:'d1',memberIds:[]}));
    for(let i=0;i<2;i++) emps.push(buildEmployee({id:'o'+i,name:'O'+i,linkedRoles:[ROLE_ONSITE],exception:'',divisionId:'d1',memberIds:[]}));
    scenario('8名/席6/常駐必須2名', emps, {d1:{id:'d1',name:'D1',seats:6}}, days5);
  })();
  // S3: チーフ＋担当メンバー（チーフは担当出社日は常駐になるはず）7名/席5
  (function(){
    const chief=buildEmployee({id:'c',name:'Chief',linkedRoles:[ROLE_CHIEF],exception:'',divisionId:'d1',memberIds:['m0','m1']});
    const emps=[chief];
    for(let i=0;i<2;i++) emps.push(buildEmployee({id:'m'+i,name:'M'+i,linkedRoles:[ROLE_REMOTE],exception:'',divisionId:'d1',memberIds:[]}));
    for(let i=0;i<4;i++) emps.push(buildEmployee({id:'x'+i,name:'X'+i,linkedRoles:[ROLE_REMOTE],exception:'',divisionId:'d1',memberIds:[]}));
    scenario('7名/席5/チーフ＋担当2名', emps, {d1:{id:'d1',name:'D1',seats:5}}, days5);
  })();
  // S4: 複数Division同時
  (function(){
    const emps=[];
    for(let i=0;i<6;i++) emps.push(buildEmployee({id:'a'+i,name:'A'+i,linkedRoles:[ROLE_REMOTE],exception:'',divisionId:'d1',memberIds:[]}));
    for(let i=0;i<7;i++) emps.push(buildEmployee({id:'b'+i,name:'B'+i,linkedRoles:[ROLE_REMOTE],exception:'',divisionId:'d2',memberIds:[]}));
    scenario('2Division同時(6/席4, 7/席5)', emps, {d1:{id:'d1',name:'D1',seats:4}, d2:{id:'d2',name:'D2',seats:5}}, days5);
  })();
  // S5: 余裕なし（席=人数）→ リモート0、誰もリモートにならない
  (function(){
    const emps=[]; for(let i=0;i<4;i++) emps.push(buildEmployee({id:'e'+i,name:'E'+i,linkedRoles:[ROLE_REMOTE],exception:'',divisionId:'d1',memberIds:[]}));
    scenario('席=人数(リモート不要)', emps, {d1:{id:'d1',name:'D1',seats:4}}, days5);
  })();

  // --- preCheck（実行不能の検知）---
  try{
    const emps=[]; for(let i=0;i<6;i++) emps.push(buildEmployee({id:'o'+i,name:'O'+i,linkedRoles:[ROLE_ONSITE],exception:'',divisionId:'d1',memberIds:[]}));
    resolveDependents(emps);
    const pre=preCheck(emps, {d1:{id:'d1',name:'D1',seats:4}}, days5);
    pre.errors.length>0 ? ok('preCheck: 常駐必須が席超過をエラー検知') : ng('preCheck: 常駐必須が席超過をエラー検知','エラーが出ていない');
  }catch(err){ ng('preCheck: 常駐必須が席超過をエラー検知','例外'+err.message); }
  try{
    // リモート可が足りない: 7名/席4 → 毎日3名×5日=延べ15枠 必要、リモート可3名×2=6枠しか出せない
    const emps=[];
    for(let i=0;i<3;i++) emps.push(buildEmployee({id:'r'+i,name:'R'+i,linkedRoles:[ROLE_REMOTE],exception:'',divisionId:'d1',memberIds:[]}));
    for(let i=0;i<4;i++) emps.push(buildEmployee({id:'o'+i,name:'O'+i,linkedRoles:[ROLE_ONSITE],exception:'',divisionId:'d1',memberIds:[]}));
    resolveDependents(emps);
    const pre=preCheck(emps, {d1:{id:'d1',name:'D1',seats:4}}, days5);
    pre.errors.length>0 ? ok('preCheck: 供給不足をエラー検知') : ng('preCheck: 供給不足をエラー検知','エラーが出ていない');
  }catch(err){ ng('preCheck: 供給不足をエラー検知','例外'+err.message); }

  // --- 公平化(countRecent)とverifyPlanの違反検知力の確認 ---
  try{
    // わざと違反した手書きプランをverifyPlanが検知できるか（テスト自身の健全性確認）
    const emps=[buildEmployee({id:'e0',name:'E0',linkedRoles:[ROLE_REMOTE],exception:'',divisionId:'d1',memberIds:[]})];
    resolveDependents(emps);
    const bad={e0:{0:true,1:true}}; // 月火で連続リモート
    const viol=verifyPlan(emps, {d1:{id:'d1',name:'D1',seats:0}}, days5, bad);
    viol.some(x=>x.includes('連続')) ? ok('verifyPlan: 連続リモート違反を検知') : ng('verifyPlan: 連続リモート違反を検知','検知できていない');
  }catch(err){ ng('verifyPlan: 連続リモート違反を検知','例外'+err.message); }

  return results;
}

/* ---- 過去実績（公平化用）---- */
function countRecent(shiftRows, mShift, mondayMs){
  const counts={};
  shiftRows.forEach(r=>{
    const w=Number(r.fields[mShift[F.SHIFT.WEEK]]); if(!w) return;
    const ago=weeksAgo(w,mondayMs); if(ago<1||ago>R.FAIRNESS_LOOKBACK_WEEKS) return;
    const empId=firstLink(r.fields[mShift[F.SHIFT.EMP]]); if(!empId) return;
    let c=0; F.SHIFT.DAYS.forEach(d=>{ if(cellText(r.fields[mShift[d]])===V.REMOTE) c++; });
    counts[empId]=(counts[empId]||0)+c;
  });
  return counts;
}

/* ---- 書き込み ---- */
async function writeShifts(ctx, monday, employees, days, remote){
  const m=ctx.maps.SHIFT;
  const present={}; days.forEach(d=>{ present[d.idx]=true; });
  const records=employees.map(e=>{
    const fields={};
    fields[m[F.SHIFT.WEEK]]=monday.getTime();
    fields[m[F.SHIFT.EMP]]=linkVal(e.id);
    F.SHIFT.DAYS.forEach((label,i)=>{
      fields[m[label]]=selVal(ctx, m[label], !present[i]?V.OFF:(remote[e.id]&&remote[e.id][i]?V.REMOTE:V.OFFICE));
    });
    fields[m[F.SHIFT.STATUS]]=selVal(ctx, m[F.SHIFT.STATUS], V.DRAFT);
    return { fields };
  });
  for(let i=0;i<records.length;i+=200){ await ctx.tables.SHIFT.addRecords(records.slice(i,i+200)); }
  return records.length;
}
async function writeWeekLog(ctx, monday, result, text){
  const m=ctx.maps.WLOG; const fields={};
  fields[m[F.WLOG.WEEK]]=monday.getTime();
  fields[m[F.WLOG.RESULT]]=selVal(ctx, m[F.WLOG.RESULT], result);
  fields[m[F.WLOG.LOG]]=text||'特記事項なし';
  fields[m[F.WLOG.STATUS]]=selVal(ctx, m[F.WLOG.STATUS], V.DRAFT);
  await ctx.tables.WLOG.addRecord({ fields });
}

/* ---- コンテキスト準備（テーブル＋フィールド検証）---- */
async function buildContext(){
  const { tables, missing }=await getTables();
  if(missing.length) throw new Error('次のテーブルが見つかりません: '+missing.join('、')+'（テーブル名の一致を確認してください）');
  const maps={}; for(const k of Object.keys(tables)) maps[k]=await getMap(tables[k]);
  const problems=[];
  checkFields(maps.ROLE,[F.ROLE.NAME,F.ROLE.REMOTE_OK],CONFIG.TABLES.ROLE,problems);
  checkFields(maps.DIV,[F.DIV.NAME,F.DIV.SEATS],CONFIG.TABLES.DIV,problems);
  checkFields(maps.EMP,[F.EMP.NAME,F.EMP.ROLE,F.EMP.DIV,F.EMP.MEMBERS,F.EMP.STATUS],CONFIG.TABLES.EMP,problems); // 例外フラグは任意
  checkFields(maps.SHIFT,[F.SHIFT.WEEK,F.SHIFT.EMP,...F.SHIFT.DAYS,F.SHIFT.STATUS],CONFIG.TABLES.SHIFT,problems);
  checkFields(maps.WLOG,[F.WLOG.WEEK,F.WLOG.RESULT,F.WLOG.LOG,F.WLOG.STATUS],CONFIG.TABLES.WLOG,problems);
  checkFields(maps.HOLIDAY,[F.HOLIDAY.DATE,F.HOLIDAY.NAME],CONFIG.TABLES.HOLIDAY,problems);
  await checkSelectOptions(tables, problems);
  if(problems.length) throw new Error(problems.join('\n'));
  const opts = {};
  Object.assign(opts, await getOptionMap(tables.SHIFT), await getOptionMap(tables.WLOG));
  return { tables, maps, opts };
}

    Object.keys(byDiv).forEach(divId=>{ const dv=divisions[divId]; if(!dv) return;
      lines.push('・'+dv.name+': 在籍'+byDiv[divId].length+'名／席'+dv.seats+' → 毎日リモート'+Math.max(0,byDiv[divId].length-dv.seats)+'名'); });
    lines.push('（抽選試行: '+plan.attempts+'回で確定）');
    if(allNotes.length){ lines.push('', '注意事項:'); allNotes.forEach(x=>lines.push('・'+x)); }
    await writeWeekLog(ctx, monday, allNotes.length?V.WARN:V.OK, lines.join('\n'));
    log('下書きを作成しました','ok');
    report(lines.join('\n'));
    allNotes.forEach(x=>log(x,'warn'));
    log('シフト表を確認し、問題なければ「週管理マスタ」のステータスを「確定」に変更してください（全体通知の自動化が発火します）。');
  }catch(e){
    log('エラー: '+String(e.message||e),'err');
    log('↑このメッセージをそのままコピーして共有いただければ原因を特定できます。','warn');
    try{ const ctx=await buildContext(); await writeWeekLog(ctx, monday, V.ERR, String(e.message||e)); }catch(_){}
  }finally{ setBusy(false); }
});

/* ---- ボタン: 仕様テスト（内蔵セルフテスト・Base不要）---- */
btnSelfTest.addEventListener('click', ()=>{
  clearLog(); setBusy(true);
  try{
    log('仕様テストを実行しています（Baseには接続しません）…','run');
    const results=runSelfTest();
    const passed=results.filter(r=>r.pass).length;
    const failed=results.filter(r=>!r.pass);
    results.forEach(r=>{
      if(r.pass) log('PASS: '+r.name,'ok');
      else log('FAIL: '+r.name+' — '+(r.detail||''),'err');
    });
    if(failed.length===0){
      log('全'+results.length+'件パス。これまでの仕様はすべて維持されています。','ok');
    }else{
      log(failed.length+'件の仕様が壊れています（FAIL '+failed.length+' / 全'+results.length+'）。上記をそのまま共有してください。','err');
    }
  }catch(e){
    log('仕様テスト自体が例外で停止: '+String(e.message||e),'err');
  }finally{ setBusy(false); }
});

/* ---- 初期表示 ---- */
document.getElementById('targetWeek').textContent=fmt(nextMonday())+' 〜';
</script>
